# Android SDK 路径配置
# 请将下面的路径修改为你的 Android SDK 安装路径

# 示例：
# Windows: sdk.dir=C\:\\Users\\YourName\\AppData\\Local\\Android\\Sdk
# Mac: sdk.dir=/Users/YourName/Library/Android/sdk
# Linux: sdk.dir=/opt/android-sdk

# 根据你的系统取消注释下面的行，或手动填写 SDK 路径：
# sdk.dir=/opt/android-sdk
# sdk.dir=/usr/local/android-sdk
# sdk.dir=$HOME/Android/Sdk
